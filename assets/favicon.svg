<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- brand mark: H2-like electron density - one shared cloud, two bright cores -->
  <defs>
    <radialGradient id="cloud" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fc0f5"/>
      <stop offset="60%" stop-color="#6ba3e3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#F1B467"/>
      <stop offset="100%" stop-color="#F1B467" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#141414"/>
  <ellipse cx="32" cy="32" rx="31" ry="23" fill="url(#cloud)"/>
  <circle cx="19" cy="32" r="14" fill="url(#core)"/>
  <circle cx="45" cy="32" r="14" fill="url(#core)"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
// pre-paint theme to avoid a flash; js/theme.js takes over afterwards
(function () {
  try {
    var t = localStorage.getItem("qft.theme") ||
      (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
})();
</script>
<title>Molecules through the eyes of quantum field theory</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main>
  <div class="titlebar">
    <h1 data-i18n="app.h1">Molecules through the eyes of quantum field theory</h1>
    <span class="row" style="gap:8px;flex-wrap:nowrap">
      <select id="langSelect" data-i18n-title="top.lang.tip"></select>
      <button id="themeToggle" class="btn icon" data-i18n-title="top.theme.tip">&#9790;</button>
      <button id="helpBtn" class="btn" data-i18n="help.btn" data-i18n-title="top.help.tip"></button>
    </span>
  </div>
  <p class="lead" data-i18n="app.lead"></p>

  <div class="shell">
    <aside class="side">
      <select id="molSelect" data-i18n-title="top.mol.tip"></select>
      <select id="basisSelect" data-i18n-title="top.basis.tip"></select>
      <button id="btnOpt" class="btn" data-i18n="top.optimize" data-i18n-title="top.optimize.tip"></button>
      <span id="status" class="status">…</span>

      <div id="customPanel" style="display:none">
        <textarea id="xyzInput" data-i18n-ph="custom.ph">O 0 0 0.1173
H 0 0.7572 -0.4692
H 0 -0.7572 -0.4692</textarea>
        <div class="row" style="margin-top:8px">
          <span class="small muted" data-i18n="custom.charge"></span>
          <input id="chargeInput" type="number" value="0" step="1" data-i18n-title="custom.charge.tip">
          <button id="computeBtn" class="btn" data-i18n="custom.compute"></button>
          <span class="small faint" data-i18n="custom.hint"></span>
        </div>
      </div>

      <div id="errorBox" class="callout" style="display:none"></div>
      <div id="facts"></div>
    </aside>

    <div class="center">
    <section class="card">
      <header>
        <span data-i18n="card.density"></span>
        <span class="row" style="gap:6px">
          <span id="sliceHint" data-i18n="sliceHint.2d"></span>
          <button id="btn3d" class="btn" style="display:none" data-i18n-title="card.3d.tip">3D</button>
          <button id="btnPng" class="btn" data-i18n-title="card.png.tip">PNG</button>
          <button id="btnCube" class="btn" data-i18n-title="card.cube.tip">.cube</button>
          <button id="btnJson" class="btn" data-i18n-title="card.json.tip">JSON</button>
          <button class="help-q" data-help="map">?</button>
        </span>
      </header>
      <div class="body">
        <div id="modePills" class="pills"></div>
        <label id="locWrap" class="small muted" style="display:inline-flex;gap:5px;align-items:center;margin:2px 0 6px" data-i18n-title="loc.tip">
          <input type="checkbox" id="locToggle"> <span data-i18n="loc.label"></span>
        </label>
        <canvas id="density" width="960" height="576"></canvas>
        <div id="glWrap" style="display:none">
          <canvas id="gl" width="960" height="576"></canvas>
          <div id="glLabels"></div>
        </div>
        <p id="modeNote" class="small muted" style="margin-top:8px"></p>
      </div>
    </section>

    <div class="grid bottom-grid" id="bottomGrid">
    <section class="card" id="energyCard">
      <header>
        <span data-i18n="card.energy"></span>
        <span class="row" style="gap:6px">
          <span data-i18n="card.energy.sub"></span>
          <button class="help-q" data-help="rscan">?</button>
        </span>
      </header>
      <div class="body">
        <svg id="energySvg" style="width:100%;height:auto;display:block"></svg>
        <div id="scanRow" class="row" style="margin-top:8px;display:none">
          <input id="rSlider" type="range" min="0" max="0" value="0" step="1" disabled style="flex:1">
          <span id="rReadout" class="small muted" style="white-space:nowrap"></span>
        </div>
        <p id="energyCaption" class="small faint" style="margin-top:6px" data-i18n="scan.const"></p>
      </div>
    </section>

    <section class="card">
      <header><span data-i18n="card.exchange"></span><button class="help-q" data-help="qft">?</button></header>
      <div class="body">
        <div class="grid" style="grid-template-columns: minmax(0,1fr) minmax(0,1.2fr); gap:12px">
          <svg id="exchange" style="width:100%;height:auto;display:block"></svg>
          <p id="pairs" class="small sec" style="margin:0"></p>
        </div>
      </div>
    </section>
    </div>
    </div>

    <aside class="rail">
      <section class="card">
        <header><span data-i18n="card.levels"></span><button class="help-q" data-help="levels">?</button></header>
        <div class="body">
          <svg id="levels" style="width:100%;height:auto;display:block"></svg>
        </div>
      </section>
      <section class="card">
        <header><span data-i18n="card.budget"></span><button class="help-q" data-help="budget">?</button></header>
        <div class="body">
          <div id="budget"></div>
          <p id="mulliken" class="small muted" style="margin-top:8px"></p>
        </div>
      </section>
    </aside>
  </div>

  <section class="card" id="vibCard">
    <header>
      <span data-i18n="card.vib"></span>
      <span class="row" style="gap:6px">
        <span class="small faint" data-i18n="card.vib.sub"></span>
        <button class="help-q" data-help="optvib">?</button>
      </span>
    </header>
    <div class="body">
      <div class="row">
        <button id="vibBtn" class="btn" data-i18n="vib.btn"></button>
        <span id="vibStatus" class="small muted" data-i18n="vib.hint"></span>
      </div>
      <div id="vibResult" style="display:none;margin-top:8px">
        <svg id="irSvg" style="width:100%;height:auto;display:block"></svg>
        <div id="vibModes" class="pills" style="margin-top:6px"></div>
        <p id="vibCaption" class="small faint" style="margin-top:6px"></p>
      </div>
    </div>
  </section>

  <footer>
    <p class="small faint" data-i18n="footer"></p>
  </footer>
</main>

<div id="helpOverlay" style="display:none">
  <div class="help-modal" role="dialog" aria-modal="true">
    <header>
      <span id="helpTitle"></span>
      <span class="row" style="gap:8px">
        <span id="helpTabs" class="pills" style="margin:0"></span>
        <button id="helpClose" class="btn" data-i18n-title="help.close.tip">&#10005;</button>
      </span>
    </header>
    <div id="helpBody" class="help-body"></div>
  </div>
</div>

<script src="js/theme.js"></script>
<script src="js/i18n.js"></script>
<script src="js/lang/en.js"></script>
<script src="js/lang/en-content.js"></script>
<script src="js/lang/ru.js"></script>
<script src="js/lang/ru-content.js"></script>
<script src="js/lang/de.js"></script>
<script src="js/lang/es.js"></script>
<script src="js/lang/zh.js"></script>
<script src="js/basis.js"></script>
<script src="js/basis631.js"></script>
<script src="js/linalg.js"></script>
<script src="js/integrals.js"></script>
<script src="js/eri.js"></script>
<script src="js/scf.js"></script>
<script src="js/uhf.js"></script>
<script src="js/props.js"></script>
<script src="js/fci2.js"></script>
<script src="js/engine.js"></script>
<script src="js/geometries.js"></script>
<script src="js/client.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/esp.js"></script>
<script src="js/localize.js"></script>
<script src="js/grid3d.js"></script>
<script src="js/view3d.js"></script>
<script src="js/energy.js"></script>
<script src="js/irchart.js"></script>
<script src="js/scan.js"></script>
<script src="js/molevels.js"></script>
<script src="js/diagrams.js"></script>
<script src="js/exporter.js"></script>
<script src="js/help.js"></script>
<script src="js/tooltip.js"></script>
<script src="js/app.js"></script>
</body>
</html>
